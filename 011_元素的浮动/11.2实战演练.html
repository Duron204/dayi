<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮动布局·经典结构</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .article {
            text-align: center;
            width: 100%;
            border: 2px solid black;
            padding: 5px 35px 35px 35px;
            overflow: auto;
        }

        .aside {
            text-align: center;
            float: left;
            width: 25%;
            height: 500px;
            background-color: red;
            padding: 8px;
        }

        .main {
            text-align: center;
            float: right;
            width: 70%;
            height: 600px;
            padding: 25px;
            background-color: blueviolet;
        }

        .asidecontent {
            text-align: center;
            width: 80%;
            height: 60%;
            margin: 0 auto;
            margin-top: 160px;
            background-color: #fff;
        }

        .header {
            text-align: center;
            width: 80%;
            height: 80px;
            margin: 0 auto;
            margin-bottom: 30px;
            background-color: aqua;
            padding: 10px;
        }

        .maincontent {
            text-align: center;
            width: 80%;
            height: 400px;
            margin: 0 auto;
            background-color: #490505;
            padding: 10px;
        }

        .footer {
            text-align: center;
            height: 100px;
            margin-top: 660px;
            background-color: bisque;
            padding: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="article"><h2>article</h2>
        <div class="aside">aside
            <div class="asidecontent">asidecontent
                
            </div>
        </div>
        <div class="main">main
            <div class="header">header
                
            </div>
            <div class="maincontent">maincontent
                
            </div>
        </div>
        <div class="footer">footer
            
        </div>
    </div>
</body>
</html>
