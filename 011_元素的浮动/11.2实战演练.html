<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站导航条</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        #menu{
            width: 100%;
            height: 35px;
            background-color: #cb111b;
            clear: both;
        }
        #menu a{
            font-size: 14px;
            width: 130px;
            height: 35px;
            color: #fff;
            float: left;
            text-align: center;
            line-height: 35px;
            text-decoration: none;
        }
        #menu a:hover{
            background-color: #f00;
        }
        #menu a.index{
            background-color: #b31610;
        }
    </style>
</head>
<body>
    <div id="menu">
        <a href="" class="index">今日上新</a>
        <a href="" >闪购自营</a>
        <a href="" >潮流服饰</a>
        <a href="" >品质鞋包</a>

        <a href="" >居家生活</a>
        <a href="" >母婴童装</a>
        <a href="" >时尚轻奢</a>
    </div>
</body>
</html>
